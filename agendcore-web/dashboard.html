<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard | AgendCore</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/toast.css">
  <link rel="stylesheet" href="assets/css/loader.css">
</head>

<body>

<div class="layout">

	<button class="sidebar-toggle" onclick="toggleSidebar()">
	  <i class="bi bi-list"></i>
	</button>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <i class="bi bi-activity"></i>
      <span>AgendCore</span>
    </div>

    <ul class="menu">
      <li onclick="cargarVista('inicio')" class="active">
        <i class="bi bi-house"></i> Inicio
      </li>
      <li onclick="cargarVista('ips')">
        <i class="bi bi-building"></i> IPS
      </li>
      <li onclick="cargarVista('sedes')">
        <i class="bi bi-geo-alt"></i> Sedes
      </li>
      <li onclick="cargarVista('especialidades')">
        <i class="bi bi-heart-pulse"></i> Especialidades
      </li>
      <li onclick="cargarVista('servicios')">
        <i class="bi bi-clipboard2-pulse"></i> Servicios
      </li>
	  <li onclick="cargarVista('profesionales')">
	    <i class="bi bi-person-badge"></i> Profesionales
	  </li>
	  <li onclick="cargarVista('roles-profesional')">
	    <i class="bi bi-diagram-3"></i> Asignación Profesional
	  </li>
	  <li onclick="cargarVista('agendas')">
		<i class="bi bi-calendar3"></i> Agendas
	  </li>
    </ul>

    <div class="logout" onclick="cerrarSesion()">
      <i class="bi bi-box-arrow-left"></i> Cerrar sesión
    </div>
  </aside>

  <!-- CONTENIDO -->
  <main class="main">

    <header class="topbar">
      <div>
        <h5 id="tituloVista">Inicio</h5>
        <small id="subtituloVista">Bienvenido al sistema</small>
      </div>

      <div class="user">
        <i class="bi bi-person-circle"></i>
        <span id="nombreUsuario"></span>
      </div>
    </header>

    <section id="contenido" class="contenido">
      <!-- dinámico -->
    </section>

  </main>

</div>

<div id="globalLoader" class="global-loader d-none">
    <div class="loader-card">
        <div class="spinner-border text-primary"></div>
        <div class="loader-text mt-3">
            Cargando...
        </div>
    </div>
</div>

<!-- ===================================================== -->
<!-- MODAL IPS -->
<!-- ===================================================== -->

<div class="modal fade" id="modalIps" tabindex="-1">

  <div class="modal-dialog modal-xl modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">

        <div>

          <h4 class="modal-title fw-bold mb-1">
            Nueva IPS
          </h4>

          <p class="mb-0 opacity-75">
            Registro institucional interoperable
          </p>

        </div>

        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="modal"
        ></button>

      </div>

      <div class="modal-body">

        <form id="formIps">

          <div class="row g-4">

            <div class="col-md-6">

              <label class="form-label">
                Nombre IPS *
              </label>

              <input
                type="text"
                class="form-control"
                id="nombreIps"
                required
              >

            </div>

            <div class="col-md-6">

              <label class="form-label">
                Razón social
              </label>

              <input
                type="text"
                class="form-control"
                id="razonSocialIps"
              >

            </div>

            <div class="col-md-4">

              <label class="form-label">
                NIT *
              </label>

              <input
                type="text"
                class="form-control"
                id="nitIps"
                required
              >

            </div>

            <div class="col-md-4">

              <label class="form-label">
                Código habilitación
              </label>

              <input
                type="text"
                class="form-control"
                id="codigoHabilitacionIps"
              >

            </div>

            <div class="col-md-4">

              <label class="form-label">
                Teléfono
              </label>

              <input
                type="text"
                class="form-control"
                id="telefonoIps"
              >

            </div>

            <div class="col-md-6">

              <label class="form-label">
                Correo
              </label>

              <input
                type="email"
                class="form-control"
                id="correoIps"
              >

            </div>

            <div class="col-md-6">

              <label class="form-label">
                Dirección
              </label>

              <input
                type="text"
                class="form-control"
                id="direccionIps"
              >

            </div>

          </div>

        </form>

      </div>

      <div class="modal-footer">

        <button
          class="btn btn-light"
          data-bs-dismiss="modal"
        >
          Cancelar
        </button>

        <button
          class="btn-save"
          onclick="guardarIps()"
          id="btnGuardarIps"
        >

          <i class="bi bi-check-circle"></i>
          Guardar IPS

        </button>

      </div>

    </div>

  </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- CORE -->
<script src="js/core/api.js"></script>
<script src="js/core/loader.js"></script>
<script src="js/core/toast.js"></script>

<!-- IPS -->
<script src="js/modules/ips/ips.api.js"></script>
<script src="js/modules/ips/ips.tabla.js"></script>
<script src="js/modules/ips/ips.index.js"></script>

<!-- DASHBOARD -->
<script src="js/dashboard.js"></script>

</body>
</html>
