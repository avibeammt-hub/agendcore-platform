<div
  class="modal fade"
  id="modalEspecialidad"
  tabindex="-1"
  aria-hidden="true">

  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content modal-enterprise">

      <div class="modal-header enterprise-header">

        <div>
          <h2
            class="modal-title"
            id="tituloModalEspecialidad">

            Nueva Especialidad

          </h2>

          <p class="modal-subtitle">
            Registro clínico interoperable
          </p>
        </div>

        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="modal">
        </button>

      </div>

      <div class="modal-body p-4">

        <form id="formEspecialidad">

          <div class="row g-4">

            <div class="col-md-6">
              <label class="form-label">
                Nombre especialidad *
              </label>

              <input
                type="text"
                class="form-control input-enterprise"
                id="nombreEspecialidad"
                required>
            </div>

            <div class="col-md-6">
              <label class="form-label">
                Código
              </label>

              <input
                type="text"
                class="form-control input-enterprise"
                id="codigoEspecialidad">
            </div>

            <div class="col-12">

              <div class="form-check form-switch mt-2">

                <input
                  class="form-check-input"
                  type="checkbox"
                  id="estadoEspecialidad"
                  checked>

                <label
                  class="form-check-label"
                  for="estadoEspecialidad">

                  Especialidad activa

                </label>

              </div>

            </div>

          </div>

        </form>

      </div>

      <div class="modal-footer border-0 px-4 pb-4">

        <button
          type="button"
          class="btn btn-light btn-lg"
          data-bs-dismiss="modal">

          Cancelar

        </button>

        <button
          type="button"
          class="btn btn-primary btn-lg"
          onclick="guardarEspecialidad()">

          <i class="bi bi-check-circle"></i>
          Guardar Especialidad

        </button>

      </div>

    </div>
  </div>
</div>
