<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACME Agenda FHIR | Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
</head>

<body class="login-body">

  <div class="login-wrapper">
    <div class="login-card shadow-lg">

      <div class="login-brand text-center mb-4">
        <div class="brand-icon">
          <i class="bi bi-hospital"></i>
        </div>
        <h1>ACME Agenda FHIR</h1>
        <p>Sistema interoperable de gestión de citas médicas</p>
      </div>

      <form id="formLogin">
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" id="usuario" class="form-control" placeholder="Ingrese su usuario" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="clave" class="form-control" placeholder="Ingrese su contraseña" required>
            <button class="btn btn-outline-secondary" type="button" id="btnVerClave">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Rol</label>
          <select id="rol" class="form-select" required>
            <option value="">Seleccione...</option>
            <option value="ADMIN">Administrador</option>
            <option value="COORDINADOR_AGENDA">Coordinador de agenda</option>
            <option value="VENTANILLA">Ventanilla</option>
            <option value="CALL_CENTER">Call Center</option>
            <option value="MEDICO">Médico</option>
            <option value="PACIENTE">Paciente</option>
          </select>
        </div>

        <div id="mensajeLogin" class="alert d-none"></div>

        <button type="submit" class="btn btn-primary w-100 btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i>
          Ingresar
        </button>
      </form>

      <div class="login-footer mt-4 text-center">
        <small>Demo académico | FHIR R4 + PostgreSQL + Node.js</small>
      </div>

    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
